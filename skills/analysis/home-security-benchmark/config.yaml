params:
  - key: mode
    label: Test Mode
    type: select
    options: [llm, vlm, full]
    default: llm
    description: "Which test suites to run: llm-only, vlm-only, or full"

  - key: noOpen
    label: Don't auto-open report
    type: boolean
    default: false
    description: Skip opening the HTML report in browser after completion
